<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="group-text.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <nav class="top-nav" aria-label="Top navigation">
            <a class="nav-item" id="profile-nav-link" href="../my-groups-page/index.html">Profile</a>
            <a class="nav-item" id="groups-nav-link" href="../homepage/index.html">My groups</a>
            <a class="nav-item nav-item-current" id="messages-nav-link" href="../messages-page/index.html" aria-current="page">Messages</a>
          </nav>
        </header>

        <section class="chat-shell" aria-label="Group chat">
          <header class="chat-header">
            <a class="back-link" href="../messages-page/index.html" aria-label="Back to messages">
              <span class="back-chevron" aria-hidden="true"></span>
            </a>
            <div class="chat-header-copy">
              <h1 class="chat-title" id="chat-title">Brunch club</h1>
              <p class="chat-subtitle" id="chat-subtitle">24 members</p>
            </div>
          </header>

          <section class="chat-thread" id="chat-thread" aria-label="Messages"></section>

          <form class="chat-compose" id="chat-compose" aria-label="Compose message">
            <input
              class="chat-input"
              id="chat-input"
              type="text"
              placeholder="Message Brunch club"
              autocomplete="off"
            />
            <button class="chat-send" type="submit">Send</button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
