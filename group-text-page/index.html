<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="group-text.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <img
            class="hero-logo"
            src="../assets/icons/link.svg"
            alt="Link"
            aria-hidden="true"
          />
          <div class="hero-search-shell" aria-hidden="true">
            <input class="hero-search-input" type="text" placeholder="Search" readonly />
          </div>
        </header>

        <section class="chat-shell" aria-label="Group chat">
          <header class="chat-header">
            <a class="back-link" href="../messages-page/index.html" aria-label="Back to messages">
              <span class="back-chevron" aria-hidden="true"></span>
            </a>
            <div class="chat-header-copy">
              <h1 class="chat-title" id="chat-title">Brunch club</h1>
              <p class="chat-subtitle" id="chat-subtitle">24 members</p>
            </div>
          </header>

          <section class="chat-thread" id="chat-thread" aria-label="Messages"></section>

          <form class="chat-compose" id="chat-compose" aria-label="Compose message">
            <input
              class="chat-input"
              id="chat-input"
              type="text"
              placeholder="Message Brunch club"
              autocomplete="off"
            />
            <button class="chat-send" type="submit">Send</button>
          </form>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="../index.html" aria-label="Home">
            <img class="nav-icon" src="../assets/icons/home.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item nav-item-active" href="../messages-page/index.html" aria-label="Messages" aria-current="page">
            <img class="nav-icon" src="../assets/icons/messages.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../search-page/index.html" aria-label="Search">
            <img class="nav-icon" src="../assets/icons/search2.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../my-groups-page/index.html" aria-label="Profile">
            <img class="nav-icon" src="../assets/icons/person.svg" alt="" aria-hidden="true" />
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
