<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Page</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="group.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page" id="group-page">
        <header class="hero-banner">
          <img
            class="hero-logo"
            src="../assets/icons/link.svg"
            alt="Link"
            aria-hidden="true"
          />
        </header>

        <section class="scroll-region" aria-label="Group details">
          <section class="group-header">
            <div class="group-title-row">
              <a class="back-link" id="back-link" href="../my-groups-page/index.html" aria-label="Back to my groups">
                <span class="back-chevron" aria-hidden="true"></span>
              </a>
              <h1 class="group-title" id="group-title">Pickleball</h1>
            </div>
            <div class="group-members">
              <div class="group-avatars" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <p class="group-members-text" id="group-members">24 members</p>
            </div>
            <p class="group-description" id="group-description">
              Welcoming local meetups for pickleball, with easy conversation and making new friends.
            </p>
          </section>

          <section class="group-actions" aria-label="Group sections">
            <button class="group-card" id="members-button" type="button">Members</button>
            <button class="group-card" id="events-button" type="button">Events</button>
            <button class="group-card" type="button">Event Check-in</button>
          </section>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="../homepage/index.html" aria-label="Home">
            <img class="nav-icon" src="../assets/icons/home.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../messages-page/index.html" aria-label="Messages">
            <img class="nav-icon" src="../assets/icons/messages.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item nav-item-active" href="../search-page/index.html" aria-label="Search" aria-current="page">
            <img class="nav-icon" src="../assets/icons/search2.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../my-groups-page/index.html" aria-label="Profile">
            <img class="nav-icon" src="../assets/icons/person.svg" alt="" aria-hidden="true" />
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
