<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="members.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <img
            class="hero-logo"
            src="../assets/icons/link.svg"
            alt="Link"
            aria-hidden="true"
          />
        </header>

        <section class="members-shell" aria-label="Group members">
          <div class="members-header">
            <a class="back-link" id="back-link" href="../my-groups-page/index.html" aria-label="Back to group">
              <span class="back-chevron" aria-hidden="true"></span>
            </a>
            <h1 class="members-title">Members</h1>
            <p class="members-subtitle" id="members-subtitle">Group</p>
          </div>

          <section class="member-rail" id="member-rail" aria-label="Member profiles"></section>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="../homepage/index.html" aria-label="Home">
            <img class="nav-icon" src="../assets/icons/home.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../messages-page/index.html" aria-label="Messages">
            <img class="nav-icon" src="../assets/icons/messages.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../search-page/index.html" aria-label="Search">
            <img class="nav-icon" src="../assets/icons/search2.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item nav-item-active" href="../my-groups-page/index.html" aria-label="Profile" aria-current="page">
            <img class="nav-icon" src="../assets/icons/person.svg" alt="" aria-hidden="true" />
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
