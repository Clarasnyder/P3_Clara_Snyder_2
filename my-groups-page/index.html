<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="my-groups.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <button class="hero-close-button" id="profile-close-button" type="button" aria-label="Close profile">
            <img
              class="hero-logo"
              src="../assets/icons/person.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </header>

        <section class="groups-content" aria-label="Profile content">
          <section class="account-card" aria-label="Account information">
            <div class="account-avatar" aria-hidden="true">CS</div>
            <div class="account-copy">
              <h1 class="account-name">Clara Snyder</h1>
              <p class="account-handle">@clarasnyder</p>
              <p class="account-meta">Knoxville, Tennessee</p>
              <p class="account-bio">
                Into brunch plans, creative projects, and meeting new people around town.
              </p>
              <button class="edit-profile-button" type="button">Edit profile</button>
            </div>
          </section>
        </section>

      </main>
    </div>
  </body>
</html>
