<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Sent</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="request-sent.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <img
            class="hero-logo"
            src="../assets/icons/link.svg"
            alt="Link"
            aria-hidden="true"
          />
          <div class="hero-search-shell" aria-hidden="true">
            <input class="hero-search-input" type="text" placeholder="Search" readonly />
          </div>
        </header>

        <section class="confirmation-panel" aria-label="Request confirmation">
          <div class="confirmation-card">
            <h1 class="confirmation-title">Link request sent!</h1>
            <p class="confirmation-message">
              You can check the status of this request in the "my groups" section of your personal
              profile!
            </p>
          </div>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="../homepage/index.html" aria-label="Home">
            <img class="nav-icon" src="../assets/icons/home.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../messages-page/index.html" aria-label="Messages">
            <img class="nav-icon" src="../assets/icons/messages.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item nav-item-active" href="../search-page/index.html" aria-label="Search" aria-current="page">
            <img class="nav-icon" src="../assets/icons/search2.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../my-groups-page/index.html" aria-label="Profile">
            <img class="nav-icon" src="../assets/icons/person.svg" alt="" aria-hidden="true" />
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
