<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Page</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="profile.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <button class="hero-close-button" id="profile-close-button" type="button" aria-label="Close profile">
            <img
              class="hero-logo"
              src="../assets/icons/person.svg"
              alt=""
              aria-hidden="true"
            />
          </button>
        </header>

        <section class="profile-content" aria-label="Profile content">
          <h1 class="profile-title">Profile</h1>

          <section class="account-card" aria-label="Account information"></section>

          <button class="groups-button" id="groups-button" type="button">My Groups</button>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="../homepage/index.html" aria-label="Home">
            <img class="nav-icon" src="../assets/icons/home.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../messages-page/index.html" aria-label="Messages">
            <img class="nav-icon" src="../assets/icons/messages.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../search-page/index.html" aria-label="Search">
            <img class="nav-icon" src="../assets/icons/search2.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item nav-item-active" href="../my-groups-page/index.html" aria-label="Profile" aria-current="page">
            <img class="nav-icon" src="../assets/icons/person.svg" alt="" aria-hidden="true" />
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
