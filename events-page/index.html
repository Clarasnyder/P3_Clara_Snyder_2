<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="events.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <nav class="top-nav" aria-label="Top navigation">
            <a class="nav-item" href="../my-groups-page/index.html">Profile</a>
            <a class="nav-item nav-item-current" href="../homepage/index.html" aria-current="page">My groups</a>
            <a class="nav-item" href="../messages-page/index.html">Messages</a>
          </nav>
        </header>

        <section class="scroll-region" aria-label="Events">
          <section class="events-shell">
            <div class="events-header">
              <div class="events-title-row">
                <a class="back-link" id="back-link" href="../group-page/index.html" aria-label="Back to group">
                  <span class="back-chevron" aria-hidden="true"></span>
                </a>
                <div>
                  <h1 class="events-title" id="events-title">Events</h1>
                </div>
              </div>
            </div>

            <section class="calendar-card" aria-label="Event calendar">
              <div class="calendar-header">
                <p class="calendar-month" id="calendar-month">May 2026</p>
              </div>

              <div class="calendar-weekdays" aria-hidden="true">
                <span>Sun</span>
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
              </div>

              <div class="calendar-grid" id="calendar-grid"></div>
            </section>

            <section class="upcoming-shell" aria-label="Upcoming events">
              <div class="upcoming-heading">
                <h2>Upcoming events</h2>
              </div>

              <div class="event-list" id="event-list"></div>
            </section>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
