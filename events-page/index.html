<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="events.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page">
        <header class="hero-banner">
          <img
            class="hero-logo"
            src="../assets/icons/link.svg"
            alt="Link"
            aria-hidden="true"
          />
        </header>

        <section class="scroll-region" aria-label="Events">
          <section class="events-shell">
            <div class="events-header">
              <div class="events-title-row">
                <a class="back-link" id="back-link" href="../group-page/index.html" aria-label="Back to group">
                  <span class="back-chevron" aria-hidden="true"></span>
                </a>
                <div>
                  <h1 class="events-title" id="events-title">Brunch club</h1>
                </div>
              </div>
            </div>

            <section class="calendar-card" aria-label="Event calendar">
              <div class="calendar-header">
                <p class="calendar-month" id="calendar-month">May 2026</p>
                <p class="calendar-caption">Important dates highlighted</p>
              </div>

              <div class="calendar-weekdays" aria-hidden="true">
                <span>Sun</span>
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
              </div>

              <div class="calendar-grid" id="calendar-grid"></div>
            </section>

            <section class="upcoming-shell" aria-label="Upcoming events">
              <div class="upcoming-heading">
                <h2>Upcoming events</h2>
                <p>Time, meeting spot, and meetup details</p>
              </div>

              <div class="event-list" id="event-list"></div>
            </section>
          </section>
        </section>

        <nav class="bottom-nav" aria-label="Bottom navigation">
          <a class="nav-item" href="../homepage/index.html" aria-label="Home">
            <img class="nav-icon" src="../assets/icons/home.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../messages-page/index.html" aria-label="Messages">
            <img class="nav-icon" src="../assets/icons/messages.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item nav-item-active" href="../search-page/index.html" aria-label="Search" aria-current="page">
            <img class="nav-icon" src="../assets/icons/search2.svg" alt="" aria-hidden="true" />
          </a>
          <a class="nav-item" href="../my-groups-page/index.html" aria-label="Profile">
            <img class="nav-icon" src="../assets/icons/person.svg" alt="" aria-hidden="true" />
          </a>
        </nav>
      </main>
    </div>
  </body>
</html>
