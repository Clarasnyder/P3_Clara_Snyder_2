<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed Page</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="homepage.js" defer></script>
  </head>
  <body>
    <div class="phone-viewport">
      <main class="page" data-node-id="2:3" data-name="Feed page">
        <header class="hero-banner" data-node-id="120:334">
          <nav class="top-nav" data-node-id="136:368" aria-label="Top navigation">
            <a class="nav-item" id="profile-launcher" href="../my-groups-page/index.html" aria-label="Profile">
              Profile
            </a>
            <a class="nav-item nav-item-current" id="groups-launcher" href="#home-greeting" aria-current="page">My groups</a>
            <a class="nav-item" id="messages-launcher" href="../messages-page/index.html" aria-label="Messages">
              Messages
            </a>
          </nav>
        </header>

        <section class="search-overlay" id="search-overlay" aria-hidden="true">
          <button class="search-overlay-backdrop" id="search-overlay-backdrop" type="button" aria-label="Close search"></button>
          <div class="search-overlay-panel">
            <iframe
              class="search-overlay-frame"
              id="search-overlay-frame"
              title="Search groups"
            ></iframe>
          </div>
        </section>

        <section class="panel-overlay panel-overlay-left" id="profile-overlay" aria-hidden="true">
          <button class="panel-overlay-backdrop" id="profile-overlay-backdrop" type="button" aria-label="Close profile"></button>
          <div class="panel-overlay-panel">
            <iframe class="panel-overlay-frame" id="profile-overlay-frame" title="Profile"></iframe>
          </div>
        </section>

        <section class="panel-overlay panel-overlay-right" id="messages-overlay" aria-hidden="true">
          <button class="panel-overlay-backdrop" id="messages-overlay-backdrop" type="button" aria-label="Close messages"></button>
          <div class="panel-overlay-panel">
            <iframe class="panel-overlay-frame" id="messages-overlay-frame" title="Messages"></iframe>
          </div>
        </section>

        <section class="home-intro" aria-labelledby="home-greeting">
          <h1 class="home-greeting" id="home-greeting">Hello, Clara</h1>
        </section>

        <section class="scroll-region" aria-label="Scrollable feed content">
          <section
            class="content-card card-one"
            data-node-id="120:337"
            data-group-title="Brunch club"
            data-group-members="24"
            data-group-description="Welcoming local meetups for brunch plans, easy conversation, and trying new spots around Knoxville."
          >
            <div class="card-photo-shell">
              <img
                class="card-photo"
                src="../assets/photos/c9fddbe6153ba83bcd9c051fca39e911.jpg"
                alt="Brunch spread on a table"
              />
            </div>
            <div class="card-actions">
              <button class="card-action-button" type="button">Go to group</button>
            </div>
          </section>
          <section
            class="content-card card-two"
            data-node-id="146:482"
            data-group-title="Crafting crew"
            data-group-members="19"
            data-group-description="A nearby community that gets together for crafting nights, shared supplies, and relaxed weekend projects."
          >
            <div class="card-photo-shell">
              <img
                class="card-photo"
                src="../assets/photos/e68c81992aa09dce515b5a73f77d17b5.jpg"
                alt="Friends crafting together around a table"
              />
            </div>
            <div class="card-actions">
              <button class="card-action-button" type="button">Go to group</button>
            </div>
          </section>
          <section
            class="content-card card-three"
            data-node-id="146:493"
            data-group-title="Pickleball"
            data-group-members="27"
            data-group-description="Beginner-friendly meetups around town with easy games, open courts, and low-pressure social play."
          >
            <div class="card-photo-shell">
              <img
                class="card-photo"
                src="../assets/photos/13376d9329100fad84a023e5ff6c623f.jpg"
                alt="Two people playing pickleball on a court"
              />
            </div>
            <div class="card-actions">
              <button class="card-action-button" type="button">Go to group</button>
            </div>
          </section>
          <section class="pending-links-shell is-hidden" id="pending-links-shell" aria-label="Pending group links">
            <div class="pending-links-heading">
              <h2>Pending links</h2>
            </div>
            <div class="pending-links-list" id="pending-links-list"></div>
          </section>
          <div class="scroll-tail" id="scroll-tail" aria-hidden="true"></div>
        </section>

        <section class="bottom-search-dock" aria-label="Search groups">
          <div class="search-area">
            <div class="search-pill">
              <input
                class="search-input"
                id="search-input"
                type="text"
                placeholder="Search"
                aria-label="Search"
                autocomplete="off"
              />
            </div>
            <div class="search-dropdown is-hidden" id="search-dropdown" aria-live="polite">
              <div class="search-suggestions" id="search-suggestions" role="listbox"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
